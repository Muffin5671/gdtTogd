<!DOCTYPE html>
<html>
  <head>
    <title>Geometry Dash Testing level to Geometry Dash level</title>
    <link href="css/stylesheet.css" rel="stylesheet">
    <script src="js/jquery-4.0.0.min.js"></script>
    <script src="js/FileSaver.min.js"></script>
  </head>
  <body>
    <p>This website converts levels built in Geometry Dash Testing's editor to Geometry Dash.</p>
    <p>Play Geometry Dash Testing at unknown</p>

    <noscript>
      <p>Your browser needs JavaScript enabled to use this website.</p>
    </noscript>

    <textarea id="gdtLevel" placeholder="Insert GDT level here" style="
      width: 400px;
      height: 200px;
      margin-bottom: 20px;
    "></textarea>
    <br>

    <input type="checkbox" id="GMD" style="
      margin-bottom: 25px;
    ">
    <label for="GMD">Download as GMD</label>
    <br>

    <button id="convert" style="
      padding: 8px 16px;
    ">Convert</button>

    <script src="js/script.js"></script>
  </body>
</html>
